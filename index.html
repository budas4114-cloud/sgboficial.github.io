<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGB – Historias que sanan</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background-color: #0b0b0b;
    color: white;
}

header {
    padding: 30px;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
}

.hero {
    height: 70vh;
    background: url('PORTADA_LIBRO_GUADA.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    padding: 60px;
}

.hero-text {
    max-width: 600px;
}

.hero-text h1 {
    font-size: 48px;
    margin-bottom: 20px;
}

.hero-text p {
    font-size: 18px;
    color: #ccc;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #e50914;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
}

.section {
    padding: 40px;
}

.section h2 {
    margin-bottom: 20px;
}

.carousel {
    display: flex;
    gap: 20px;
    overflow-x: auto;
}

.card {
    min-width: 180px;
    transition: transform 0.3s;
}

.card img {
    width: 100%;
    border-radius: 6px;
}

.card:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<header>
SEBASTIÁN OLMEDO
</header>

<section class="hero">
    <div class="hero-text">
        <h1>Historias que sanan</h1>
        <p>Libros que no se leen… se sienten.</p>
        <button class="btn">Explorar</button>
    </div>
</section>

<section class="section">
    <h2>Libros destacados</h2>
    <div class="carousel">

        <div class="card">
            <img src="PORTADA_LIBRO_GUADA.jpg">
        </div>

        <div class="card">
            <img src="balduino.png">
        </div>

        <div class="card">
            <img src="depresyvos.png">
        </div>

    </div>
</section>

</body>
</html>
